<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>H&abyz · Product Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F1EB;
    --paper-deep:#ECE7DD;
    --ink:#3A3A40;
    --muted:#8C8780;
    --hair:rgba(58,58,64,.14);
    --hair-strong:rgba(58,58,64,.28);
    --accent:#C0714A;
    --frame:#FFFFFF;
    --shadow:38px 40px 80px -36px rgba(58,46,34,.45);
    --shadow-soft:18px 22px 44px -28px rgba(58,46,34,.35);
    --ease:cubic-bezier(.22,.61,.18,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #FBF9F4 0%, var(--paper) 46%, var(--paper-deep) 100%);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100svh;
    display:flex;flex-direction:column;
    overflow-x:hidden;
  }

  /* ---------- HEADER ---------- */
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:16px;
    padding:clamp(18px,3.4vw,34px) clamp(20px,4vw,52px);
    padding-top:max(clamp(18px,3.4vw,34px),env(safe-area-inset-top));
  }
  .brand{justify-self:start;display:flex;align-items:center}
  .brand img{height:clamp(20px,2.4vw,30px);width:auto;display:block;opacity:.92}
  .model{justify-self:center;text-align:center;line-height:1}
  .model .eyebrow{
    font-size:clamp(9px,1vw,11px);
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:500;
    padding-left:.42em;
  }
  .model .name{
    font-family:"Fraunces",Georgia,serif;
    font-weight:400;
    font-size:clamp(19px,3.1vw,32px);
    letter-spacing:.02em;
    margin-top:7px;
    white-space:nowrap;
  }
  .model .rule{
    width:46px;height:1px;background:var(--hair-strong);
    margin:11px auto 0;
  }
  .topbar .spacer{justify-self:end}

  /* ---------- STAGE / CAROUSEL ---------- */
  .stage{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
    padding:clamp(8px,2vw,24px) 0 clamp(70px,9vw,96px);
    touch-action:pan-y;
    user-select:none;
  }
  .track{
    position:relative;
    width:100%;
    height:min(58vh,calc((100vw - 0px) * 0.42));
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .card{
    position:absolute;
    top:50%;left:50%;
    width:var(--cardW);
    aspect-ratio:16/9;
    transform:translate(-50%,-50%);
    transition:transform .62s var(--ease), opacity .62s var(--ease), filter .62s var(--ease);
    will-change:transform,opacity;
  }
  .card .mat{
    position:absolute;inset:0;
    background:var(--frame);
    border-radius:6px;
    padding:0;
    box-shadow:var(--shadow-soft);
    overflow:hidden;
  }
  .card img,.card .ph{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .card .cap{
    position:absolute;left:50%;bottom:-30px;transform:translateX(-50%);
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    white-space:nowrap;opacity:0;transition:opacity .5s var(--ease) .1s;
    pointer-events:none;
  }

  /* default = far / hidden */
  .card{opacity:0;z-index:1;pointer-events:none}

  /* desktop positions (2 buffers per side) */
  .stage{--cardW:clamp(280px,52vw,720px)}

  .card[data-pos="0"]{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;z-index:50;pointer-events:auto;
  }
  .card[data-pos="0"] .mat{box-shadow:var(--shadow)}
  .card[data-pos="0"] .cap{opacity:1}

  .card[data-pos="-1"],.card[data-pos="1"]{
    opacity:.5;z-index:40;pointer-events:auto;
    filter:grayscale(.18) brightness(.99);
  }
  .card[data-pos="-1"]{transform:translate(calc(-50% - 60%),-50%) scale(.78)}
  .card[data-pos="1"]{transform:translate(calc(-50% + 60%),-50%) scale(.78)}

  .card[data-pos="-2"],.card[data-pos="2"]{
    opacity:.24;z-index:30;pointer-events:auto;
    filter:grayscale(.3) brightness(.985);
  }
  .card[data-pos="-2"]{transform:translate(calc(-50% - 108%),-50%) scale(.6)}
  .card[data-pos="2"]{transform:translate(calc(-50% + 108%),-50%) scale(.6)}

  .card[data-pos="far-left"]{transform:translate(calc(-50% - 150%),-50%) scale(.5);opacity:0}
  .card[data-pos="far-right"]{transform:translate(calc(-50% + 150%),-50%) scale(.5);opacity:0}

  /* ---------- ARROWS (web) ---------- */
  .nav{
    position:absolute;top:50%;transform:translateY(-50%);
    z-index:60;
    width:54px;height:54px;border-radius:50%;
    border:1px solid var(--hair-strong);
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(6px);
    color:var(--ink);
    display:grid;place-items:center;
    cursor:pointer;
    transition:background .25s var(--ease),border-color .25s var(--ease),transform .25s var(--ease),opacity .3s var(--ease);
  }
  .nav:hover{background:#fff;border-color:var(--accent);color:var(--accent)}
  .nav:active{transform:translateY(-50%) scale(.94)}
  .nav.prev{left:clamp(10px,3vw,40px)}
  .nav.next{right:clamp(10px,3vw,40px)}
  .nav svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.4;fill:none}
  .nav[disabled]{opacity:.28;cursor:default;pointer-events:none}
  .nav:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

  /* ---------- FOOTER META ---------- */
  .meta{
    position:absolute;left:0;right:0;bottom:clamp(20px,4vw,34px);
    display:flex;flex-direction:column;align-items:center;gap:14px;
    pointer-events:none;
  }
  .counter{
    font-family:"Fraunces",serif;font-size:14px;letter-spacing:.18em;color:var(--muted);
  }
  .counter b{color:var(--ink);font-weight:500}
  .dots{display:flex;gap:9px;pointer-events:auto}
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--hair-strong);border:0;padding:0;cursor:pointer;
    transition:background .3s var(--ease),transform .3s var(--ease),width .3s var(--ease);
  }
  .dot.active{background:var(--accent);width:20px;border-radius:4px}
  .dot:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

  /* ---------- MOBILE (1 buffer per side, swipe) ---------- */
  @media (max-width:760px){
    .stage{--cardW:min(72vw,420px)}
    .track{height:min(46vh,calc(100vw*0.62))}
    .nav{display:none}
    .card[data-pos="-1"]{transform:translate(calc(-50% - 64%),-50%) scale(.8);opacity:.42}
    .card[data-pos="1"]{transform:translate(calc(-50% + 64%),-50%) scale(.8);opacity:.42}
    /* hide 2nd buffer on mobile */
    .card[data-pos="-2"]{transform:translate(calc(-50% - 120%),-50%) scale(.66);opacity:0;pointer-events:none}
    .card[data-pos="2"]{transform:translate(calc(-50% + 120%),-50%) scale(.66);opacity:0;pointer-events:none}
    .card[data-pos="0"] .cap{bottom:-26px;font-size:10px}
    .model .name{font-size:clamp(17px,5vw,22px)}
  }

  @media (prefers-reduced-motion:reduce){
    .card,.nav,.dot{transition-duration:.01ms}
  }

  /* swipe hint (mobile, fades after first interaction) */
  .hint{
    position:absolute;bottom:calc(clamp(20px,4vw,34px) + 46px);left:50%;transform:translateX(-50%);
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    display:none;opacity:.7;animation:pulse 2.4s ease-in-out infinite;pointer-events:none;
  }
  @media (max-width:760px){body.ready .hint{display:block}}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.8}}
  body.touched .hint{display:none}

  /* ---------- loading / error / empty ---------- */
  .notice{
    position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);
    text-align:center;color:var(--muted);max-width:80vw;z-index:6;
    font-size:14px;letter-spacing:.03em;line-height:1.75;
  }
  .notice .big{font-family:"Fraunces",serif;color:var(--ink);font-size:19px;letter-spacing:.05em;margin-bottom:9px}
  .notice code{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:rgba(58,58,64,.07);
    padding:2px 7px;border-radius:5px;color:var(--ink)}
  .notice.hidden{display:none}
  .spin{width:26px;height:26px;border-radius:50%;border:2px solid var(--hair-strong);
    border-top-color:var(--accent);margin:0 auto 16px;animation:rot .85s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .meta{opacity:0;transition:opacity .45s var(--ease)}
  body.ready .meta{opacity:1}
  @media (prefers-reduced-motion:reduce){.spin{animation-duration:2.4s}}
</style>
</head>

    </div>
    <div class="model">
      <div class="eyebrow" id="eyebrow">Collection</div>
      <div class="name" id="modelName">MODEL NAME</div>
      <div class="rule"></div>
    </div>
    <div class="spacer"></div>
  </header>

  <main class="stage" id="stage" aria-roledescription="carousel" aria-label="제품 이미지 갤러리">
    <button class="nav prev" id="prev" aria-label="이전 이미지">
      <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
    </button>

    <div class="track" id="track"></div>

    <button class="nav next" id="next" aria-label="다음 이미지">
      <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
    </button>

    <div class="hint">swipe →</div>

    <div class="notice hidden" id="notice"></div>

    <div class="meta">
      <div class="counter"><b id="cur">01</b> / <span id="total">00</span></div>
      <div class="dots" id="dots" role="tablist" aria-label="이미지 선택"></div>
    </div>
  </main>

<script>
/* ============================================================
   H&abyz Product Gallery — GitHub 폴더 자동조회 버전
   ------------------------------------------------------------
   ■ 설정은 같은 폴더의 config.json 에서 수정합니다 (HTML 수정 불필요).
       {
         "owner":"github아이디", "repo":"저장소명", "branch":"main",
         "folder":"images/model-x",
         "collection":"Collection", "modelName":"HB-2400"
       }
   ■ 이미지: 위 folder 안에 .jpg/.png/.webp 등을 넣으면 자동 인식.
   ■ 순서: 파일명 오름차순 (01_, 02_ … 접두어로 제어).
   ■ URL 파라미터로 임시 덮어쓰기:
       index.html?folder=images/model-b&model=HB-9000&collection=2026
       index.html?config=config-b.json   (다른 설정파일 로드)
   ============================================================ */

  const DEFAULTS = {
    owner:"", repo:"", branch:"main",
    folder:"images", collection:"Collection", modelName:"MODEL NAME"
  };
  const IMAGE_RE = /\.(jpe?g|png|webp|gif|avif)$/i;

  const $ = id => document.getElementById(id);
  const track=$('track'), dotsWrap=$('dots'), prevBtn=$('prev'), nextBtn=$('next'),
        curEl=$('cur'), totalEl=$('total'), notice=$('notice'), stage=$('stage');

  let cards=[], active=0, N=0;

  /* 개별 이미지 로드 실패 시 대체 자리표시 */
  function placeholder(i){
    const tones=[["#E8C9A6","#C0714A"],["#E3D2BC","#A9886A"],["#EAD9C2","#B98a5e"],
                 ["#DCC8AE","#9C7A55"],["#EFE0CC","#C58f63"],["#E1CDB4","#A07b58"],["#ECDAC4","#BE8456"]];
    const [a,b]=tones[i%tones.length];
    const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900'>
      <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0' stop-color='${a}'/><stop offset='1' stop-color='${b}'/></linearGradient></defs>
      <rect width='1600' height='900' fill='url(#g)'/>
      <text x='800' y='500' font-family='Inter,sans-serif' font-size='40' fill='rgba(255,255,255,.7)'
        text-anchor='middle' letter-spacing='8'>NO IMAGE</text></svg>`;
    return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
  }

  const param = k => new URLSearchParams(location.search).get(k);
  function showNotice(html){ notice.innerHTML=html; notice.classList.remove('hidden'); }
  function hideNotice(){ notice.classList.add('hidden'); }
  function cleanCaption(name){
    return name.replace(IMAGE_RE,'').replace(/^\d+[\s._-]+/,'').replace(/[._-]+/g,' ').trim();
  }

  async function loadConfig(){
    let cfg = {...DEFAULTS};
    const cfgFile = param('config') || 'config.json';
    try{
      const r = await fetch(cfgFile,{cache:'no-cache'});
      if(r.ok) cfg = {...cfg, ...(await r.json())};
    }catch(e){ /* file:// 또는 파일없음 → 파라미터/기본값 사용 */ }
    ['owner','repo','branch','folder','collection'].forEach(k=>{
      const v=param(k); if(v) cfg[k]=v;
    });
    const m=param('model'); if(m) cfg.modelName=m;
    return cfg;
  }

  async function listImages(cfg){
    const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.folder}?ref=${encodeURIComponent(cfg.branch)}`;
    const r=await fetch(url,{headers:{'Accept':'application/vnd.github+json'}});
    if(r.status===403) throw {code:'rate'};
    if(r.status===404) throw {code:'notfound'};
    if(!r.ok) throw {code:'http',status:r.status};
    const data=await r.json();
    if(!Array.isArray(data)) throw {code:'notfolder'};
    return data
      .filter(f=>f.type==='file' && IMAGE_RE.test(f.name))
      .sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}))
      .map(f=>({src:f.download_url, caption:cleanCaption(f.name)}));
  }

  function buildCards(items){
    track.innerHTML=''; dotsWrap.innerHTML='';
    cards = items.map((item,i)=>{
      const card=document.createElement('div'); card.className='card';
      const mat=document.createElement('div'); mat.className='mat';
      const img=document.createElement('img');
      img.src=item.src; img.alt=item.caption||('이미지 '+(i+1));
      img.loading=i<3?'eager':'lazy'; img.draggable=false;
      img.onerror=()=>{ img.onerror=null; img.src=placeholder(i); };
      mat.appendChild(img);
      const cap=document.createElement('div'); cap.className='cap'; cap.textContent=item.caption||'';
      card.appendChild(mat); card.appendChild(cap);
      card.addEventListener('click',()=>{ if(i!==active) go(i); });
      track.appendChild(card);

      const dot=document.createElement('button'); dot.className='dot'; dot.setAttribute('role','tab');
      dot.setAttribute('aria-label',(i+1)+'번 이미지');
      dot.addEventListener('click',()=>go(i)); dotsWrap.appendChild(dot);
      return {card,dot};
    });
    N=cards.length; active=0;
    totalEl.textContent=String(N).padStart(2,'0');
    document.body.classList.add('ready');
    render();
  }

  function render(){
    cards.forEach(({card,dot},i)=>{
      const off=i-active;
      let pos;
      if(off===0)pos="0";
      else if(off>=-2&&off<=2)pos=String(off);
      else pos= off<0 ? "far-left":"far-right";
      card.dataset.pos=pos;
      card.setAttribute('aria-hidden', off===0?"false":"true");
      dot.classList.toggle('active',i===active);
      dot.setAttribute('aria-selected',i===active?"true":"false");
    });
    curEl.textContent=String(active+1).padStart(2,'0');
    prevBtn.disabled=active===0;
    nextBtn.disabled=active===N-1;
  }

  function go(i){ if(!N)return; active=Math.max(0,Math.min(N-1,i)); render(); }
  function next(){ go(active+1); }
  function prev(){ go(active-1); }

  /* interactions (한 번만 연결) */
  prevBtn.addEventListener('click',prev);
  nextBtn.addEventListener('click',next);
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight')next(); else if(e.key==='ArrowLeft')prev();
  });
  let startX=0,dragging=false,moved=false;
  stage.addEventListener('pointerdown',e=>{
    dragging=true;moved=false;startX=e.clientX;document.body.classList.add('touched');
  });
  window.addEventListener('pointermove',e=>{
    if(dragging && Math.abs(e.clientX-startX)>8) moved=true;
  });
  window.addEventListener('pointerup',e=>{
    if(!dragging)return;dragging=false;
    const dx=e.clientX-startX;
    if(dx<=-45)next(); else if(dx>=45)prev();
  });
  track.addEventListener('click',e=>{ if(moved){e.stopPropagation();e.preventDefault();} },true);

  /* init */
  (async()=>{
    const cfg = await loadConfig();
    $('modelName').textContent = cfg.modelName || 'MODEL NAME';
    $('eyebrow').textContent   = cfg.collection || '';
    if(!cfg.owner || !cfg.repo){
      showNotice(`<div class="big">설정이 필요합니다</div>config.json 의 <code>owner</code> / <code>repo</code> 값을 채워주세요.`);
      return;
    }
    showNotice(`<div class="spin"></div>이미지를 불러오는 중…`);
    try{
      const items = await listImages(cfg);
      if(!items.length){
        showNotice(`<div class="big">이미지가 없습니다</div><code>${cfg.folder}</code> 폴더에 이미지를 올려주세요.`);
        return;
      }
      buildCards(items);
      hideNotice();
    }catch(err){
      if(err.code==='rate')
        showNotice(`<div class="big">잠시 후 다시 시도해주세요</div>GitHub 조회 한도(시간당 60회)에 도달했습니다.`);
      else if(err.code==='notfound')
        showNotice(`<div class="big">폴더를 찾을 수 없습니다</div><code>${cfg.owner}/${cfg.repo}</code> 의 <code>${cfg.folder}</code> 경로와 저장소 공개 여부를 확인해주세요.`);
      else
        showNotice(`<div class="big">불러오지 못했습니다</div>네트워크 또는 저장소 설정을 확인해주세요.`);
      console.error('[gallery]',err);
    }
  })();
</script>
</body>
</html>
